name: Update repository list

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: update-repo-list-main
  cancel-in-progress: false

jobs:
  update-repo-list:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Show repository tree
        run: |
          pwd
          ls -la
          ls -la .github || true
          ls -la .github/scripts || true

      - name: Run generator
        env:
          GITHUB_USERNAME: ricbencar
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/update_repo_list.py

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "No changes to commit."
            exit 0
          fi

          git add README.md
          git commit -m "Update repository list"

          # The remote branch may have advanced after checkout or while this job
          # was running. Rebase local changes on top of the latest remote main
          # before pushing, so the push remains fast-forward.
          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main
